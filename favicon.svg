<svg width="128" height="128" viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bg" cx="35%" cy="40%" r="75%">
      <stop offset="0%" stop-color="#4a6fa5"/>
      <stop offset="100%" stop-color="#2c3e6b"/>
    </radialGradient>
    <clipPath id="rounded"><rect width="128" height="128" rx="26"/></clipPath>
  </defs>

  <!-- Base -->
  <rect width="128" height="128" rx="26" fill="url(#bg)"/>

  <!-- Prominent impressionist brushstrokes — thicker, higher contrast, more varied angles -->
  <g clip-path="url(#rounded)">

    <!-- Sky zone — bold blue strokes with visible color shifts -->
    <rect x="-8" y="4" width="48" height="14" rx="7" fill="#3a5a90" opacity="0.7" transform="rotate(-15 16 11)"/>
    <rect x="26" y="0" width="44" height="13" rx="6" fill="#5c80c0" opacity="0.65" transform="rotate(-8 48 6)"/>
    <rect x="65" y="2" width="50" height="14" rx="7" fill="#4a68a8" opacity="0.6" transform="rotate(6 90 9)"/>
    <rect x="98" y="10" width="40" height="12" rx="6" fill="#7a78be" opacity="0.5" transform="rotate(12 118 16)"/>

    <rect x="-10" y="20" width="46" height="13" rx="6" fill="#4e72a8" opacity="0.65" transform="rotate(-10 13 26)"/>
    <rect x="24" y="16" width="42" height="14" rx="7" fill="#6890c8" opacity="0.55" transform="rotate(-14 45 23)"/>
    <rect x="58" y="14" width="48" height="13" rx="6" fill="#5474aa" opacity="0.6" transform="rotate(8 82 20)"/>
    <rect x="92" y="24" width="44" height="12" rx="6" fill="#6a7cb4" opacity="0.5" transform="rotate(14 114 30)"/>

    <!-- Mid zone — transitional blues with lavender/violet touches -->
    <rect x="-6" y="38" width="44" height="13" rx="6" fill="#4878a0" opacity="0.6" transform="rotate(-12 16 44)"/>
    <rect x="28" y="34" width="40" height="12" rx="6" fill="#7080b8" opacity="0.5" transform="rotate(8 48 40)"/>
    <rect x="60" y="36" width="46" height="13" rx="6" fill="#5a6caa" opacity="0.55" transform="rotate(-6 83 42)"/>
    <rect x="92" y="40" width="42" height="12" rx="6" fill="#8070b8" opacity="0.45" transform="rotate(16 113 46)"/>

    <!-- Water zone — teal, green, deeper reflections -->
    <rect x="-8" y="54" width="48" height="13" rx="6" fill="#3a6880" opacity="0.55" transform="rotate(-8 16 60)"/>
    <rect x="30" y="56" width="42" height="12" rx="6" fill="#4a7890" opacity="0.5" transform="rotate(10 51 62)"/>
    <rect x="62" y="52" width="46" height="13" rx="6" fill="#3a5e78" opacity="0.5" transform="rotate(-5 85 58)"/>
    <rect x="94" y="58" width="40" height="12" rx="6" fill="#5a6a8a" opacity="0.45" transform="rotate(12 114 64)"/>

    <!-- Lower zone — rich darks with green/ochre undertones -->
    <rect x="-6" y="88" width="50" height="14" rx="7" fill="#2a5858" opacity="0.5" transform="rotate(-6 19 95)"/>
    <rect x="30" y="90" width="44" height="13" rx="6" fill="#3a6a58" opacity="0.45" transform="rotate(5 52 96)"/>
    <rect x="64" y="88" width="46" height="13" rx="6" fill="#4a6248" opacity="0.4" transform="rotate(-8 87 94)"/>
    <rect x="92" y="84" width="44" height="14" rx="7" fill="#5a5450" opacity="0.4" transform="rotate(10 114 91)"/>

    <rect x="-4" y="104" width="48" height="13" rx="6" fill="#2a4a50" opacity="0.45" transform="rotate(-5 20 110)"/>
    <rect x="32" y="106" width="42" height="12" rx="6" fill="#3a5a48" opacity="0.4" transform="rotate(8 53 112)"/>
    <rect x="66" y="104" width="44" height="13" rx="6" fill="#4a5440" opacity="0.35" transform="rotate(-6 88 110)"/>
    <rect x="94" y="100" width="42" height="14" rx="7" fill="#5a4a52" opacity="0.4" transform="rotate(12 115 107)"/>

    <!-- Vivid accent dabs — Monet palette pops (larger, bolder) -->
    <ellipse cx="16" cy="14" rx="10" ry="5" fill="#b8a9d8" opacity="0.6" transform="rotate(-25 16 14)"/>
    <ellipse cx="110" cy="18" rx="9" ry="5" fill="#a8c890" opacity="0.55" transform="rotate(18 110 18)"/>
    <ellipse cx="10" cy="68" rx="9" ry="5" fill="#60b0a0" opacity="0.5" transform="rotate(-12 10 68)"/>
    <ellipse cx="116" cy="64" rx="10" ry="5" fill="#a080c0" opacity="0.45" transform="rotate(20 116 64)"/>
    <ellipse cx="14" cy="110" rx="10" ry="5" fill="#408870" opacity="0.45" transform="rotate(-10 14 110)"/>
    <ellipse cx="112" cy="106" rx="9" ry="5.5" fill="#e0a0a8" opacity="0.45" transform="rotate(15 112 106)"/>
    <!-- Extra warm dabs in middle -->
    <ellipse cx="18" cy="42" rx="8" ry="4" fill="#d0a860" opacity="0.4" transform="rotate(-18 18 42)"/>
    <ellipse cx="110" cy="42" rx="8" ry="4.5" fill="#e8b8b0" opacity="0.35" transform="rotate(14 110 42)"/>

    <!-- Gold paint smear accent at bottom — bolder -->
    <rect x="20" y="113" width="88" height="9" rx="4.5" fill="#d4a853" opacity="0.5" transform="rotate(-1.5 64 117)"/>

    <!-- Starry highlights — slightly larger -->
    <circle cx="20" cy="20" r="2.5" fill="#d8e8ff" opacity="0.7"/>
    <circle cx="108" cy="14" r="2.2" fill="#e8d8f8" opacity="0.6"/>
    <circle cx="8" cy="54" r="2" fill="#b8e8e0" opacity="0.55"/>
    <circle cx="120" cy="50" r="2" fill="#d8d8f0" opacity="0.5"/>
    <circle cx="14" cy="96" r="2" fill="#a8d8c0" opacity="0.5"/>
    <circle cx="114" cy="94" r="2.2" fill="#f0e0b0" opacity="0.45"/>
    <circle cx="50" cy="8" r="1.8" fill="#c8d8f8" opacity="0.5"/>
    <circle cx="80" cy="118" r="1.8" fill="#d8c8a8" opacity="0.4"/>
  </g>

  <!-- YL monogram — crisp, clean -->
  <text x="65" y="83" text-anchor="middle" font-family="'Cormorant Garamond', Georgia, serif" font-weight="600" font-size="62" fill="#1a2040" letter-spacing="-2" opacity="0.2">YL</text>
  <text x="64" y="82" text-anchor="middle" font-family="'Cormorant Garamond', Georgia, serif" font-weight="600" font-size="62" fill="#faf6ef" letter-spacing="-2">YL</text>
</svg>
